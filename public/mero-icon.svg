<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7BFF"/>
      <stop offset="100%" stop-color="#0047D9"/>
    </linearGradient>

    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB21A"/>
      <stop offset="100%" stop-color="#FF8200"/>
    </linearGradient>

    <linearGradient id="bottomBar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F4F8"/>
    </linearGradient>

    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#002A7A" flood-opacity="0.18"/>
    </filter>

    <filter id="barShadow" x="-20%" y="-20%" width="140%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#002A7A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect
    x="8"
    y="8"
    width="496"
    height="496"
    rx="96"
    fill="url(#bg)"
    filter="url(#iconShadow)"
  />

  <rect
    x="20"
    y="20"
    width="472"
    height="472"
    rx="84"
    fill="none"
    stroke="#FFFFFF"
    stroke-opacity="0.08"
    stroke-width="2"
  />

  <rect
    x="108"
    y="176"
    width="296"
    height="56"
    rx="28"
    fill="url(#topBar)"
    filter="url(#barShadow)"
  />

  <rect
    x="108"
    y="280"
    width="296"
    height="56"
    rx="28"
    fill="url(#bottomBar)"
    filter="url(#barShadow)"
  />
</svg>
